AWSTemplateFormatVersion: '2010-09-09'
Description: >-
  Cast-Clone T1 Starter — single-EC2 deployment via AWS Marketplace.
  Provisions a VPC + 1 EC2 + EBS + Secrets Manager + IAM + AWS Backup.
  Bedrock-powered AI requires no customer setup; license starts in 14-day trial mode.

# ---------------------------------------------------------------------------
# Parameters — kept minimal for Marketplace Quick Launch conversion
# ---------------------------------------------------------------------------

Parameters:
  InstanceType:
    Type: String
    Default: m6i.xlarge
    AllowedValues:
      - m6i.large
      - m6i.xlarge
      - m6i.2xlarge
      - r6i.xlarge
      - r6i.2xlarge
      - r6i.4xlarge
    Description: >-
      EC2 instance size. m6i.large fits ~100k LOC; m6i.xlarge (default) handles
      up to 1M LOC; r6i.4xlarge required for 10M+ LOC.

  DataVolumeSizeGB:
    Type: Number
    Default: 100
    MinValue: 50
    MaxValue: 16000
    Description: >-
      EBS data volume size (Postgres + Neo4j + uploaded archives). Sizing guide
      in the listing description.

  KeyPairName:
    Type: String
    Default: ''
    Description: >-
      (Optional) Existing EC2 key pair name for SSH access. Leave blank to use
      AWS Systems Manager Session Manager only (recommended).

  AllowedHTTPSCidr:
    Type: String
    Default: 0.0.0.0/0
    AllowedPattern: '^([0-9]{1,3}\.){3}[0-9]{1,3}/(?:[0-9]|[12][0-9]|3[0-2])$'
    Description: >-
      CIDR block allowed to reach the application on port 443. Default is the
      public internet — tighten for private deployments.

  LicenseJWT:
    Type: String
    Default: ''
    NoEcho: true
    Description: >-
      (Optional) Production license JWT delivered by email after purchase.
      Leave blank to start in 14-day trial mode.

# ---------------------------------------------------------------------------
# Mappings — populated by infra/scripts/update-cfn-mappings.sh after Packer build
# ---------------------------------------------------------------------------

Mappings:
  RegionToAMI:
    us-east-1:      { AMI: AMI_ID_PLACEHOLDER }
    us-east-2:      { AMI: AMI_ID_PLACEHOLDER }
    us-west-2:      { AMI: AMI_ID_PLACEHOLDER }
    eu-west-1:      { AMI: AMI_ID_PLACEHOLDER }
    eu-central-1:   { AMI: AMI_ID_PLACEHOLDER }
    ap-south-1:     { AMI: AMI_ID_PLACEHOLDER }
    ap-south-2:     { AMI: AMI_ID_PLACEHOLDER }
    ap-southeast-1: { AMI: AMI_ID_PLACEHOLDER }
    ap-southeast-2: { AMI: AMI_ID_PLACEHOLDER }
    ap-northeast-1: { AMI: AMI_ID_PLACEHOLDER }

# ---------------------------------------------------------------------------
# Conditions
# ---------------------------------------------------------------------------

Conditions:
  HasKeyPair: !Not [!Equals [!Ref KeyPairName, '']]
  HasLicense: !Not [!Equals [!Ref LicenseJWT, '']]

# ---------------------------------------------------------------------------
# Resources
# ---------------------------------------------------------------------------

Resources:

  # ----- Network -----

  VPC:
    Type: AWS::EC2::VPC
    Properties:
      CidrBlock: 10.42.0.0/16
      EnableDnsSupport: true
      EnableDnsHostnames: true
      Tags:
        - { Key: Name,    Value: !Sub '${AWS::StackName}-vpc' }
        - { Key: Project, Value: cast-clone }

  InternetGateway:
    Type: AWS::EC2::InternetGateway
    Properties:
      Tags:
        - { Key: Name, Value: !Sub '${AWS::StackName}-igw' }

  IGWAttachment:
    Type: AWS::EC2::VPCGatewayAttachment
    Properties:
      VpcId: !Ref VPC
      InternetGatewayId: !Ref InternetGateway

  PublicSubnet:
    Type: AWS::EC2::Subnet
    Properties:
      VpcId: !Ref VPC
      CidrBlock: 10.42.0.0/20
      AvailabilityZone: !Select [0, !GetAZs '']
      MapPublicIpOnLaunch: true
      Tags:
        - { Key: Name, Value: !Sub '${AWS::StackName}-public' }

  PublicRouteTable:
    Type: AWS::EC2::RouteTable
    Properties:
      VpcId: !Ref VPC

  PublicRoute:
    Type: AWS::EC2::Route
    DependsOn: IGWAttachment
    Properties:
      RouteTableId: !Ref PublicRouteTable
      DestinationCidrBlock: 0.0.0.0/0
      GatewayId: !Ref InternetGateway

  PublicSubnetAssoc:
    Type: AWS::EC2::SubnetRouteTableAssociation
    Properties:
      RouteTableId: !Ref PublicRouteTable
      SubnetId: !Ref PublicSubnet

  # ----- Security group -----

  SecurityGroup:
    Type: AWS::EC2::SecurityGroup
    Properties:
      GroupDescription: Cast-Clone T1 monolith
      VpcId: !Ref VPC
      SecurityGroupIngress:
        - IpProtocol: tcp
          FromPort: 443
          ToPort: 443
          CidrIp: !Ref AllowedHTTPSCidr
          Description: HTTPS
      SecurityGroupEgress:
        - IpProtocol: -1
          CidrIp: 0.0.0.0/0
          Description: All egress
      Tags:
        - { Key: Name, Value: !Sub '${AWS::StackName}-sg' }

  # ----- Secrets -----

  PgPasswordSecret:
    Type: AWS::SecretsManager::Secret
    Properties:
      Name: !Sub '${AWS::StackName}/postgres/password'
      Description: PostgreSQL master password
      GenerateSecretString:
        PasswordLength: 32
        ExcludeCharacters: '$<>(){}[]:/@?&"\;'

  Neo4jPasswordSecret:
    Type: AWS::SecretsManager::Secret
    Properties:
      Name: !Sub '${AWS::StackName}/neo4j/password'
      Description: Neo4j password
      GenerateSecretString:
        PasswordLength: 32
        ExcludeCharacters: '$<>(){}[]:/@?&"\;'

  LicenseSecret:
    Type: AWS::SecretsManager::Secret
    Properties:
      Name: !Sub '${AWS::StackName}/license/jwt'
      Description: Cast-Clone license JWT (TRIAL_PLACEHOLDER triggers AMI-baked trial)
      SecretString: !If [HasLicense, !Ref LicenseJWT, 'TRIAL_PLACEHOLDER']

  # ----- IAM -----

  ApplicationRole:
    Type: AWS::IAM::Role
    Properties:
      RoleName: !Sub '${AWS::StackName}-application'
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Action: sts:AssumeRole
            Principal: { Service: ec2.amazonaws.com }
      ManagedPolicyArns:
        - arn:aws:iam::aws:policy/AmazonSSMManagedInstanceCore
      Policies:
        - PolicyName: cast-clone-runtime
          PolicyDocument:
            Version: '2012-10-17'
            Statement:
              - Effect: Allow
                Action:
                  - bedrock:InvokeModel
                  - bedrock:InvokeModelWithResponseStream
                Resource: arn:aws:bedrock:*::foundation-model/anthropic.*
              - Effect: Allow
                Action:
                  - secretsmanager:GetSecretValue
                  - secretsmanager:DescribeSecret
                Resource:
                  - !Ref PgPasswordSecret
                  - !Ref Neo4jPasswordSecret
                  - !Ref LicenseSecret
              - Effect: Allow
                Action:
                  - logs:CreateLogGroup
                  - logs:CreateLogStream
                  - logs:PutLogEvents
                Resource: !Sub 'arn:${AWS::Partition}:logs:${AWS::Region}:${AWS::AccountId}:log-group:/cast-clone/*'

  InstanceProfile:
    Type: AWS::IAM::InstanceProfile
    Properties:
      InstanceProfileName: !Sub '${AWS::StackName}-application'
      Roles: [!Ref ApplicationRole]

  # ----- Compute -----

  EC2Instance:
    Type: AWS::EC2::Instance
    Properties:
      ImageId: !FindInMap [RegionToAMI, !Ref 'AWS::Region', AMI]
      InstanceType: !Ref InstanceType
      KeyName: !If [HasKeyPair, !Ref KeyPairName, !Ref AWS::NoValue]
      IamInstanceProfile: !Ref InstanceProfile
      SubnetId: !Ref PublicSubnet
      SecurityGroupIds: [!Ref SecurityGroup]
      MetadataOptions:
        HttpTokens: required
        HttpPutResponseHopLimit: 2
      BlockDeviceMappings:
        - DeviceName: /dev/xvda
          Ebs:
            VolumeSize: 30
            VolumeType: gp3
            Encrypted: true
            DeleteOnTermination: true
      UserData:
        Fn::Base64: !Sub |
          #!/bin/bash
          set -euxo pipefail
          export REGION=${AWS::Region}
          export PG_PASSWORD_SECRET_ARN=${PgPasswordSecret}
          export NEO4J_PASSWORD_SECRET_ARN=${Neo4jPasswordSecret}
          export LICENSE_JWT_SECRET_ARN=${LicenseSecret}
          export AI_PROVIDER=bedrock
          export BEDROCK_REGION=${AWS::Region}
          export ANTHROPIC_API_KEY_SECRET_ARN=""
          export OPENAI_API_KEY_SECRET_ARN=""
          /opt/cast-clone/bootstrap.sh
      Tags:
        - { Key: Name,            Value: !Sub '${AWS::StackName}-monolith' }
        - { Key: CastCloneBackup, Value: 'true' }
        - { Key: Project,         Value: cast-clone }

  EBSDataVolume:
    Type: AWS::EC2::Volume
    Properties:
      AvailabilityZone: !GetAtt EC2Instance.AvailabilityZone
      Size: !Ref DataVolumeSizeGB
      VolumeType: gp3
      Iops: 3000
      Throughput: 125
      Encrypted: true
      Tags:
        - { Key: Name,            Value: !Sub '${AWS::StackName}-data' }
        - { Key: CastCloneBackup, Value: 'true' }
        - { Key: Project,         Value: cast-clone }

  VolumeAttachment:
    Type: AWS::EC2::VolumeAttachment
    Properties:
      Device: /dev/sdf
      VolumeId: !Ref EBSDataVolume
      InstanceId: !Ref EC2Instance

  EIP:
    Type: AWS::EC2::EIP
    Properties:
      Domain: vpc
      Tags:
        - { Key: Name, Value: !Sub '${AWS::StackName}-eip' }

  EIPAssociation:
    Type: AWS::EC2::EIPAssociation
    Properties:
      AllocationId: !GetAtt EIP.AllocationId
      InstanceId: !Ref EC2Instance

  # ----- Backups -----

  BackupVault:
    Type: AWS::Backup::BackupVault
    Properties:
      BackupVaultName: !Sub '${AWS::StackName}-vault'

  BackupRole:
    Type: AWS::IAM::Role
    Properties:
      RoleName: !Sub '${AWS::StackName}-backup'
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Action: sts:AssumeRole
            Principal: { Service: backup.amazonaws.com }
      ManagedPolicyArns:
        - arn:aws:iam::aws:policy/service-role/AWSBackupServiceRolePolicyForBackup

  BackupPlan:
    Type: AWS::Backup::BackupPlan
    Properties:
      BackupPlan:
        BackupPlanName: !Sub '${AWS::StackName}-daily'
        BackupPlanRule:
          - RuleName: daily
            TargetBackupVault: !Ref BackupVault
            ScheduleExpression: cron(0 5 ? * * *)
            Lifecycle:
              DeleteAfterDays: 7

  BackupSelection:
    Type: AWS::Backup::BackupSelection
    Properties:
      BackupPlanId: !Ref BackupPlan
      BackupSelection:
        SelectionName: !Sub '${AWS::StackName}-tagged'
        IamRoleArn: !GetAtt BackupRole.Arn
        ListOfTags:
          - ConditionType: STRINGEQUALS
            ConditionKey: CastCloneBackup
            ConditionValue: 'true'

# ---------------------------------------------------------------------------
# Outputs
# ---------------------------------------------------------------------------

Outputs:
  ApplicationURL:
    Value: !Sub 'https://${EIP}'
    Description: >-
      Cast-Clone HTTPS URL. The certificate is self-signed; expect a one-time
      browser warning. Wait ~60 seconds after stack completion for first-boot
      bootstrap to finish.

  LicenseSecretArn:
    Value: !Ref LicenseSecret
    Description: >-
      Update this secret with the production JWT from your purchase email,
      then restart the backend container via SSM:
      'sudo docker restart cast-clone-backend-1'.

  SSMSessionCommand:
    Value: !Sub 'aws ssm start-session --target ${EC2Instance} --region ${AWS::Region}'
    Description: Open an interactive shell on the instance (no SSH key required).

  PublicIP:
    Value: !Ref EIP
    Description: Elastic IP attached to the instance.

  BootstrapLogTailCommand:
    Value: !Sub 'aws ssm start-session --target ${EC2Instance} --region ${AWS::Region} --document-name AWS-StartInteractiveCommand --parameters command=["sudo tail -f /var/log/cast-clone/bootstrap.log"]'
    Description: Tail the first-boot bootstrap log for troubleshooting.
