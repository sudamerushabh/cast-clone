services:
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    ports:
      - "15432:5432"
    environment:
      POSTGRES_DB: codelens
      POSTGRES_USER: codelens
      POSTGRES_PASSWORD: codelens
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U codelens -d codelens"]
      interval: 10s
      timeout: 5s
      retries: 5

  neo4j:
    image: neo4j:5-community
    restart: unless-stopped
    ports:
      - "0.0.0.0:17474:7474"
      - "0.0.0.0:17687:7687"
    environment:
      NEO4J_AUTH: neo4j/codelens
      NEO4J_PLUGINS: '["apoc", "graph-data-science"]'
    volumes:
      - neo4j_data:/data
    healthcheck:
      test: ["CMD", "cypher-shell", "-u", "neo4j", "-p", "codelens", "RETURN 1"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  minio:
    image: minio/minio
    restart: unless-stopped
    ports:
      - "9000:9000"
      - "9001:9001"
    environment:
      MINIO_ROOT_USER: codelens
      MINIO_ROOT_PASSWORD: codelens123
    volumes:
      - minio_data:/data
    command: server /data --console-address ":9001"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ./cast-clone-backend
      dockerfile: Dockerfile
    ports:
      - "0.0.0.0:8000:8000"
    environment:
      DATABASE_URL: "postgresql+asyncpg://codelens:codelens@postgres:5432/codelens"
      NEO4J_URI: "bolt://neo4j:7687"
      NEO4J_USER: "neo4j"
      NEO4J_PASSWORD: "codelens"
      REDIS_URL: "redis://redis:6379/0"
      MINIO_ENDPOINT: "minio:9000"
      MINIO_ACCESS_KEY: "codelens"
      MINIO_SECRET_KEY: "codelens123"
      MINIO_SECURE: "false"
      # CORS_ORIGINS + AUTH_DISABLED must be set via `.env` file; see .env.example.
      # Do NOT hardcode permissive values here — they would bypass the
      # auth-wildcard validator in app.config._reject_cors_wildcard_when_auth_enabled.
      CORS_ORIGINS: ${CORS_ORIGINS:-[]}
      AUTH_DISABLED: ${AUTH_DISABLED:-false}
      LOG_LEVEL: "info"
    volumes:
      - /home/ubuntu/repos:/home/ubuntu/repos
    depends_on:
      postgres:
        condition: service_healthy
      neo4j:
        condition: service_healthy
      redis:
        condition: service_healthy
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/health')"]
      interval: 10s
      timeout: 5s
      retries: 5

  frontend:
    build:
      context: ./cast-clone-frontend
      dockerfile: Dockerfile
    ports:
      - "0.0.0.0:3000:3000"
    environment:
      HOSTNAME: "0.0.0.0"
    depends_on:
      - backend
    restart: unless-stopped

  mcp:
    build:
      context: ./cast-clone-backend
      dockerfile: Dockerfile.mcp
    ports:
      - "${MCP_PORT:-8090}:8090"
    environment:
      CORS_ORIGINS: ${CORS_ORIGINS:-[]}
      AUTH_DISABLED: ${AUTH_DISABLED:-false}
      DATABASE_URL: "postgresql+asyncpg://codelens:codelens@postgres:5432/codelens"
      NEO4J_URI: "bolt://neo4j:7687"
      NEO4J_USER: "neo4j"
      NEO4J_PASSWORD: "codelens"
      REDIS_URL: "redis://redis:6379/0"
      MCP_PORT: "8090"
    depends_on:
      postgres:
        condition: service_healthy
      neo4j:
        condition: service_healthy
    restart: unless-stopped

  mailhog:
    image: mailhog/mailhog:latest
    ports:
      - "1025:1025"   # SMTP
      - "8025:8025"   # Web UI
    profiles:
      - dev
    restart: unless-stopped

volumes:
  postgres_data:
  neo4j_data:
  redis_data:
  minio_data:
