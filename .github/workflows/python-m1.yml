name: Python M1 integration tests

on:
  pull_request:
    paths:
      - 'cast-clone-backend/**'
      - '.github/workflows/python-m1.yml'
  push:
    branches:
      - main

jobs:
  python-m1:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: cast-clone-backend
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v3

      - name: Set up Python 3.12
        run: uv python install 3.12

      - name: Install dependencies
        run: uv sync

      - name: Run unit tests
        run: uv run pytest tests/unit -v

      - name: Run M1 integration tests
        run: uv run pytest tests/integration/test_python_m1_pipeline.py -v -m integration

      # NOTE: tests/integration/test_python_m1_scip.py requires scip-python binary + PyPI network.
      # Runs manually via `pytest -m scip_python`. Track via nightly workflow if added later.
